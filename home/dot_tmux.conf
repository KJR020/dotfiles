# prefix を Ctrl-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000

# Task memo: prefix + m to set
bind m command-prompt -p "task:" "set-option -w @task '%%'"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default"
set -g status-left-length 140
# 日本語ラベルを表示して、現在の状態を一目で把握しやすくする
set -g status-left '#[fg=#7f849c]ホスト #{host_short} #[fg=#CDD6F4]#{?@agent,#[fg=#b4befe]AI #{@agent} ,#[fg=#585b70]AI 未設定 }#{?@task,#[fg=#a6e3a1]作業 #{@task} ,#[fg=#585b70]作業 未設定 }#[fg=#CDD6F4]窓 #W '
set -g status-right-length 30
set -g status-right '%H:%M'
