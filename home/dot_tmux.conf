# prefix を Ctrl-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# Task memo: prefix + m to set
bind m command-prompt -p "task:" "set-option -w @task '%%'"

# ─── Status bar: 2-line layout ───────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status 2

# Line 1: context info (Catppuccin Surface0)
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left-length 160
set -g status-left '#[fg=#89b4fa,bold]  #{host_short} #[fg=#585b70]│ #{?@agent,#[fg=#b4befe,bold]  #{@agent} ,#[fg=#585b70]  未設定 }#[fg=#585b70]│ #{?@task,#[fg=#a6e3a1,bold]  #{@task} ,#[fg=#585b70]  未設定 }'
set -g status-right-length 40
set -g status-right '#[fg=#f9e2af]  %m/%d #[fg=#585b70]│ #[fg=#cdd6f4,bold] %H:%M'

# Hide default window list from line 1 (shown on line 2 instead)
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# Line 2: window list (Catppuccin Mantle)
set -g status-format[1] '#[bg=#181825 align=left] #{W: #[fg=#585b70 bg=#181825] #{window_index}:#{window_name}#{window_flags}  ,#[fg=#89dceb bold bg=#181825]  #{window_index}:#{window_name}#{window_flags}  }'

# ─── Bell / notification ─────────────────────────────────────
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# Monitor activity for non-active windows
set -g monitor-activity on
set -g visual-activity off
set -g activity-action other

# Allow passthrough for terminal bell
set -g allow-passthrough on
