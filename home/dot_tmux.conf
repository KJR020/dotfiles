set -g mouse on
set -g history-limit 50000

# Task memo: prefix + m to set, prefix + M to view all windows
bind m command-prompt -p "task:" "set-option -w @task '%%'"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default"
set -g status-left-length 80
set -g status-left '#[fg=#7f849c] #{host_short} #[fg=#CDD6F4]#{?@agent,#[fg=#b4befe]✦ ,}#{?@task,#[fg=#a6e3a1]● #[fg=#CDD6F4]#W#[fg=#7f849c]・#{@task},#[fg=#585b70]○ #[fg=#CDD6F4]#W} '
set -g status-right-length 30
set -g status-right '%H:%M'
